name: Build Toolchain

on:
  workflow_dispatch:   # triggered manually or by the main repo
  push:
    branches: [main]
    paths:
      - 'build.sh'     # only rebuild if the build script changes

permissions:
  contents: write      # needed to create GitHub releases

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgmp-dev \
            libmpfr-dev \
            libmpc-dev \
            texinfo \
            curl \
            xz-utils

      - name: Build toolchain
        run: |
          chmod +x build.sh
          bash build.sh /opt/boredos-toolchain

      - name: Verify toolchain
        run: |
          /opt/boredos-toolchain/bin/x86_64-boredos-gcc --version
          /opt/boredos-toolchain/bin/x86_64-boredos-g++ --version
          /opt/boredos-toolchain/bin/x86_64-boredos-ld --version
          du -sh /opt/boredos-toolchain
          ls -lh boredos-toolchain.tar.xz

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BINUTILS_VERSION: "2.42"
          GCC_VERSION: "14.2.0"
        run: |
          # Delete any existing 'latest' release to replace it
          gh release delete latest --yes 2>/dev/null || true
          gh release create latest \
            --title "BoredOS Toolchain (x86_64-boredos)" \
            --notes "Pre-built x86_64-boredos cross-compiler (binutils ${BINUTILS_VERSION}, GCC ${GCC_VERSION})." \
            --latest \
            boredos-toolchain.tar.xz
